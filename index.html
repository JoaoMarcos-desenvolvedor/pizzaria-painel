<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leblon Prime - Nuvem</title>
    <!-- Bibliotecas Oficiais do Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #2f3542; color: #ffffff; margin: 20px; }
        h1 { border-bottom: 2px solid #e74c3c; padding-bottom: 10px; color: #e74c3c; margin-bottom: 20px; }
        .layout-config { background: #3f4452; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid #2ed573; }
        .layout-config h3 { margin-top: 0; color: #2ed573; }
        .config-group { display: inline-block; margin-right: 20px; margin-bottom: 10px; }
        .config-group label { display: block; font-size: 13px; margin-bottom: 5px; color: #a4b0be; }
        .config-group input, .config-group select { background: #1e222b; color: white; border: 1px solid #57606f; padding: 8px; border-radius: 4px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #3f4452; border-radius: 8px; padding: 15px; border-left: 5px solid #e74c3c; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .edit-box { width: 100%; height: 250px; background: #1e222b; padding: 10px; border-radius: 4px; border: 1px solid #57606f; font-family: monospace; font-size: 13px; color: #f1f2f6; resize: vertical; box-sizing: border-box; margin-bottom: 10px; }
        .edit-box:focus { border-color: #e74c3c; outline: none; }
        button { background: #e74c3c; color: white; border: none; padding: 12px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; font-size: 14px; }
        button:hover { background: #c0392b; }
        .aviso-edit { font-size: 11px; color: #a4b0be; margin-bottom: 5px; display: block; font-style: italic; }
    </style>
</head>
<body>
    <h1>🍕 Painel Nuvem - Leblon Prime Pizza</h1>
    
    <div class="layout-config">
        <h3>📐 Ajustes de Impressão Manual</h3>
        <div class="config-group">
            <label>Texto do Cabeçalho</label>
            <input type="text" id="cfg-cabecalho" value="LEBLON PRIME PIZZA" style="width: 250px;">
        </div>
        <div class="config-group">
            <label>Avanço de Papel</label>
            <select id="cfg-linhas">
                <option value="5" selected>5 linhas (Recomendado)</option>
                <option value="8">8 linhas</option>
            </select>
        </div>
    </div>

    <div class="grid" id="pedidos-container">Conectando à nuvem...</div>

    <script>
        // Configuração Direta do Firebase
        // Configuração COMPLETA do Firebase
       // Configuração COMPLETA do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBaoqTkIVcr-Bop8UWkexg7w3G-OAmvMjk",
            authDomain: "leblonprimepizza.firebaseapp.com",
            databaseURL: "https://leblonprimepizza-default-rtdb.firebaseio.com",
            projectId: "leblonprimepizza",
            storageBucket: "leblonprimepizza.firebasestorage.app",
            messagingSenderId: "292228771003",
            appId: "1:292228771003:web:c3431afe1725f6a1350d9e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Escuta os últimos 15 pedidos em tempo real
        db.ref("pedidos_pendentes").limitToLast(15).on("value", (snapshot) => {
            const container = document.getElementById('pedidos-container');
            container.innerHTML = "";
            let temPedidos = false;

            snapshot.forEach((childSnapshot) => {
                temPedidos = true;
                const pedido = childSnapshot.val();
                const key = childSnapshot.key;
                
                // Puxa o texto limpo para edição
                const textoExibicao = pedido.textoPuro || pedido.texto; 

                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `
                    <h3>${new Date(pedido.dataHora).toLocaleTimeString()} - Status: ${pedido.impresso ? '✅ Impresso' : '⏳ Aguardando'}</h3>
                    <span class="aviso-edit">✍️ Edite se necessário e reenvie para a impressora</span>
                    <textarea id="txt-${key}" class="edit-box">${textoExibicao}</textarea>
                    <button onclick="salvarEImprimir('${key}')">🖨️ Enviar para Impressora</button>
                `;
                // Insere no topo da lista
                container.insertBefore(card, container.firstChild);
            });

            if(!temPedidos) {
                container.innerHTML = "<p>Nenhum pedido recente na nuvem.</p>";
            }
        });

        function salvarEImprimir(key) {
            const novoTextoPuro = document.getElementById('txt-' + key).value;
            const cabecalho = document.getElementById('cfg-cabecalho').value;
            const linhas = parseInt(document.getElementById('cfg-linhas').value);

            // Remonta com os códigos ESC/POS
            let textoFormatado = "\n\n\n";
            if (cabecalho) {
                textoFormatado += \`\\x1B\\x61\\x01\\x1D\\x21\\x11\${cabecalho}\\n\\x1D\\x21\\x00\\x1B\\x61\\x00--------------------------------\\n\`;
            }
            textoFormatado += novoTextoPuro;
            const quebras = "\n".repeat(linhas);
            textoFormatado += quebras;

            // Atualiza direto na Nuvem
            db.ref("pedidos_pendentes/" + key).update({
                textoPuro: novoTextoPuro,
                texto: textoFormatado,
                impresso: false // O Receptor vê isso e imprime de novo
            }).then(() => {
                alert("Enviado para a impressora!");
            }).catch(err => {
                alert("Erro ao enviar: " + err.message);
            });
        }
    </script>
</body>
</html>
